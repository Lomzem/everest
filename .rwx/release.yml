on:
  github:
    push:
      if: ${{ event.git.tag != "" }}
      init:
        commit-sha: ${{ event.git.sha }}
        tag: ${{ event.git.tag }}
        repository-url: ${{ event.github.push.repository.clone_url }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

defaults:
  runner:
    cpus: 8
    memory: 32gb

tasks:
  - key: code
    call: git/clone 2.0.8
    with:
      repository: ${{ init.repository-url }}
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: setup-system
    use: code
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        pkg-config \
        libwebkit2gtk-4.1-dev \
        libgtk-3-dev \
        libayatana-appindicator3-dev \
        librsvg2-dev \
        libssl-dev \
        zip
      sudo apt-get clean

  - key: setup-node
    use: code
    call: nodejs/install 1.1.14
    with:
      node-version: "20.12.0"

  - key: setup-rust
    use: code
    call: rust-lang/install 1.0.7
    with:
      rust-version: stable

  - key: build-linux-appimage
    use: [code, setup-node, setup-rust, setup-system]
    env:
      RELEASE_TAG: ${{ init.tag }}
    run: |
      curl -fsSL https://bun.sh/install | bash
      export BUN_INSTALL="$HOME/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"

      bun install
      bun run tauri:build:appimage

      appimage="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -n 1)"
      if [ -z "$appimage" ]; then
        echo "No AppImage produced"
        exit 1
      fi

      mkdir -p artifacts/linux
      cp "$appimage" "artifacts/linux/Basecamp-${RELEASE_TAG}-linux.AppImage"
    outputs:
      artifacts:
        - key: appimage
          path: artifacts/linux

  - key: build-windows-exe
    use: [code, setup-node, setup-rust, setup-system]
    after: build-linux-appimage
    env:
      RELEASE_TAG: ${{ init.tag }}
    run: |
      curl -fsSL https://bun.sh/install | bash
      export BUN_INSTALL="$HOME/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"

      bun install
      bun run tauri:build:win

      exe="$(find src-tauri/target -path '*/bundle/nsis/*.exe' -type f | head -n 1)"
      if [ -z "$exe" ]; then
        echo "No Windows installer produced"
        exit 1
      fi

      mkdir -p artifacts/windows
      cp "$exe" "artifacts/windows/Basecamp-${RELEASE_TAG}-windows.exe"
    outputs:
      artifacts:
        - key: exe
          path: artifacts/windows

  - key: setup-gh
    use: code
    call: github/install-cli 1.0.10

  - key: publish-release
    after: [build-linux-appimage, build-windows-exe, setup-gh]
    use: [build-linux-appimage, build-windows-exe]
    env:
      RELEASE_TAG: ${{ init.tag }}
      COMMIT_SHA: ${{ init.commit-sha }}
      GH_TOKEN: ${{ github.token }}
    run: |
      linux_artifact="$(find "${{ tasks.build-linux-appimage.artifacts.appimage }}" -name '*.AppImage' | head -n 1)"
      windows_artifact="$(find "${{ tasks.build-windows-exe.artifacts.exe }}" -name '*.exe' | head -n 1)"

      if [ -z "$linux_artifact" ] || [ -z "$windows_artifact" ]; then
        echo "Missing release artifacts"
        exit 1
      fi

      if ! [ -f "$linux_artifact" ] || ! [ -f "$windows_artifact" ]; then
        echo "Release artifacts are not files"
        exit 1
      fi

      if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
        gh release upload "$RELEASE_TAG" "$linux_artifact" "$windows_artifact" --clobber
      else
        gh release create "$RELEASE_TAG" "$linux_artifact" "$windows_artifact" \
          --target "$COMMIT_SHA" \
          --title "Release $RELEASE_TAG" \
          --generate-notes
      fi
