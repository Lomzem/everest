name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - created
      - published

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: bun-windows-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            bun-windows-${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Build Windows executable
        run: bun tauri build --target x86_64-pc-windows-msvc --bundles nsis
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/**/*.exe
          if-no-files-found: error

  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: bun-ubuntu-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            bun-ubuntu-${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Build Linux AppImage
        run: bun tauri build --bundles appimage
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/**/*.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish to GitHub Releases
    if: github.event_name == 'release'
    needs:
      - build-windows-exe
      - build-linux-appimage
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/linux
      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/**/*.exe
            artifacts/linux/**/*.AppImage
